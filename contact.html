<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Kontak - LearnSpark</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <nav>
    <div class="logo"><h2>LearnSpark 💡</h2></div>
    <ul class="menu">
      <li><a href="index.html">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="features.html">Fitur</a></li>
      <li><a href="contact.html">Kontak</a></li>
    </ul>
  </nav>

  <main class="container">
    <h1>Hubungi Kami</h1>
    <p>Silakan isi form di bawah ini untuk mendaftar sebagai member baru.</p>

    <form onsubmit="munculkanAlert(event)">
      <label for="nama">Nama Lengkap:</label>
      <input type="text" id="nama" placeholder="Masukkan nama..." required>

      <label for="email">Alamat Email:</label>
      <input type="email" id="email" placeholder="contoh@gmail.com" required>

      <label for="minat">Minat Belajar Utama:</label>
      <select id="minat" required>
        <option value="" disabled selected>Pilih salah satu...</option>
        <option value="cyber">Cyber Security & CTF</option>
        <option value="web">Pengembangan Aplikasi & Database</option>
        <option value="video">Video Editing / After Effects</option>
      </select>

      <button type="submit">Kirim Pesan</button>
    </form>
  </main>

  <script>
    function munculkanAlert(event) {
      // event.preventDefault() digunakan agar halaman tidak me-refresh saat tombol submit ditekan
      event.preventDefault(); 
      alert("Pesan anda terkirim!");
      
      // Mengosongkan form kembali setelah submit
      event.target.reset(); 
    }
  </script>
</body>
</html>
